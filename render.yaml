services:
  - type: web
    name: sossou-kouame-paiement
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bonjour
          property: connectionString
      - key: SITE_URL
        value: https://sossou-kouame-paiement.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TG_ID
        sync: false
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TG_SESSION
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: MONEY_FUSION_API_URL
        sync: false

databases:
  - name: bonjour
    plan: free
    databaseName: bonjour
    user: bonjour_user

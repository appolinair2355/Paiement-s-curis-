<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Sossou Kouamé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <!-- Arrière-plan animé -->
  <div class="bg-canvas"></div>
  <div class="grid-overlay"></div>
  <div class="stars" id="stars"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-brand">
        <div class="login-icon-wrap">
          <span class="login-icon">💎</span>
        </div>
        <h1>SOSSOU KOUAMÉ</h1>
        <p>Espace membre sécurisé</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-form">
          <div class="form-group">
            <label for="username">Identifiant</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="username" placeholder="Entrez votre identifiant" autocomplete="username" required>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" placeholder="Entrez votre mot de passe" autocomplete="current-password" required>
              <button type="button" class="toggle-pwd" onclick="togglePwd()" tabindex="-1">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div id="loginErr" class="login-error hidden">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="loginErrText"></span>
          </div>

          <button type="submit" class="btn-login" id="loginBtn" style="margin-top:6px">
            <span id="loginBtnTxt">Se connecter</span>
            <span class="btn-loader hidden" id="loginLoad"></span>
          </button>
        </div>
      </form>

      <div class="login-divider"><span>✦ sécurisé par chiffrement ✦</span></div>
      <p class="login-footer-note">© 2025 Sossou Kouamé — Tous droits réservés</p>
    </div>
  </div>

  <script>
    // Étoiles
    (function(){
      const c = document.getElementById('stars');
      for(let i=0;i<80;i++){
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random()*2+1;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
        c.appendChild(s);
      }
    })();

    // Auth check
    fetch('/api/me').then(r=>{ if(r.ok) window.location.href='/dashboard.html'; }).catch(()=>{});

    async function handleLogin(e){
      e.preventDefault();
      const btn=document.getElementById('loginBtn');
      const txt=document.getElementById('loginBtnTxt');
      const ld =document.getElementById('loginLoad');
      const err=document.getElementById('loginErr');
      const etx=document.getElementById('loginErrText');

      btn.disabled=true; txt.textContent='Connexion…'; ld.classList.remove('hidden');
      err.classList.add('hidden');

      try {
        const r = await fetch('/api/login',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const d = await r.json();
        if(r.ok && d.success){
          txt.textContent='✓ Bienvenue !';
          setTimeout(()=>window.location.href='/dashboard.html', 400);
        } else {
          etx.textContent = d.error || 'Erreur de connexion';
          err.classList.remove('hidden');
          btn.disabled=false; txt.textContent='Se connecter'; ld.classList.add('hidden');
          document.querySelector('.login-card').style.animation='shake .4s ease';
          setTimeout(()=>document.querySelector('.login-card').style.animation='',500);
        }
      } catch {
        etx.textContent='Erreur réseau. Vérifiez votre connexion.';
        err.classList.remove('hidden');
        btn.disabled=false; txt.textContent='Se connecter'; ld.classList.add('hidden');
      }
    }

    function togglePwd(){
      const i=document.getElementById('password');
      i.type = i.type==='password' ? 'text' : 'password';
    }
  </script>

  <style>
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-6px)}
      40%,80%{transform:translateX(6px)}
    }
  </style>
</body>
</html>

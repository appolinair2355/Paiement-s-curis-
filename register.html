<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — Sossou Kouamé Shopping Boutique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body.login-page{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px 60px;position:relative;z-index:1}
    .login-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:26px 22px;width:100%;max-width:460px}
    .login-form-inner{display:flex;flex-direction:column;gap:14px;margin-top:16px}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-label-sm{display:block;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
    .footer-note{text-align:center;color:rgba(255,255,255,.2);font-size:.72rem;margin-top:36px}
    .hint{color:rgba(255,255,255,.4);font-size:.74rem;margin-top:-6px}
    .login-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:10px 14px;color:#6EE7B7;font-size:.82rem;display:flex;align-items:center;gap:8px}
  </style>
</head>
<body class="login-page">
  <div class="bg-canvas"></div>
  <div class="grid-overlay"></div>
  <div class="stars" id="stars"></div>
  <div class="particle" style="left:8%;top:20%;--p-dur:7s;--p-delay:0s;opacity:.25"></div>
  <div class="particle" style="left:92%;top:35%;--p-dur:9s;--p-delay:1.5s;width:6px;height:6px;opacity:.2"></div>
  <div class="particle" style="left:15%;top:75%;--p-dur:8s;--p-delay:3s;opacity:.3"></div>
  <div class="particle" style="left:85%;top:70%;--p-dur:6s;--p-delay:0.8s;width:3px;height:3px"></div>

  <div class="page-brand" style="text-align:center;margin-bottom:28px;width:100%;max-width:520px">
    <div class="page-brand-logo" style="height:54px;width:auto;border-radius:10px;overflow:hidden;display:inline-block;margin-bottom:10px">
      <img src="logo-sk.png" alt="Logo" style="height:100%" onerror="this.closest('.page-brand-logo').style.display='none'">
    </div>
    <h1 style="color:#a5b4fc">📝 Créer votre compte</h1>
    <p>Inscrivez-vous directement sur le site — ou via le bot Telegram</p>
  </div>

  <div class="login-card">
    <form id="regForm" onsubmit="handleRegister(event)">
      <div class="login-form-inner">

        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label-sm" for="first_name">Prénom</label>
            <div class="input-wrapper">
              <input type="text" id="first_name" placeholder="Jean" autocomplete="given-name">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label-sm" for="last_name">Nom</label>
            <div class="input-wrapper">
              <input type="text" id="last_name" placeholder="Dupont" autocomplete="family-name">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-sm" for="username">Identifiant *</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" placeholder="ex: jean.dupont" autocomplete="username" required>
          </div>
          <div class="hint">Lettres, chiffres, . et _ uniquement — min. 3 caractères</div>
        </div>

        <div class="form-group">
          <label class="form-label-sm" for="email">Email (facultatif)</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="jean@exemple.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-sm" for="password">Mot de passe *</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Min. 6 caractères" autocomplete="new-password" required>
            <button type="button" class="toggle-pwd" onclick="togglePwd('password')" tabindex="-1">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-sm" for="confirm">Confirmer le mot de passe *</label>
          <div class="input-wrapper">
            <input type="password" id="confirm" placeholder="Retapez le mot de passe" autocomplete="new-password" required>
            <button type="button" class="toggle-pwd" onclick="togglePwd('confirm')" tabindex="-1">👁</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label-sm" for="promo">Code promo (facultatif)</label>
          <div class="input-wrapper">
            <input type="text" id="promo" placeholder="ex: BIENVENUE10" style="text-transform:uppercase">
          </div>
        </div>

        <div id="regErr" class="login-error hidden">
          <span id="regErrText"></span>
        </div>
        <div id="regOk" class="login-success hidden">
          <span>✅ Compte créé ! Redirection…</span>
        </div>

        <button type="submit" class="btn-login" id="regBtn">
          <span id="regBtnTxt">Créer mon compte</span>
          <span class="btn-loader hidden" id="regLoad"></span>
        </button>

        <p style="text-align:center;font-size:.8rem;color:rgba(255,255,255,.4);margin:12px 0 0">
          Déjà inscrit ? <a href="/" style="color:#60C8F5;text-decoration:underline">Se connecter</a>
        </p>
        <p id="tgAltWrap" style="text-align:center;font-size:.78rem;color:rgba(255,255,255,.35);margin:2px 0 0" class="hidden">
          Vous préférez Telegram ? <a id="tgRegLink" href="#" target="_blank" style="color:#60C8F5;text-decoration:underline">S'inscrire via le bot 🤖</a>
        </p>
      </div>
    </form>
  </div>

  <p class="footer-note">© 2026 Sossou Kouamé Shopping Boutique</p>

  <script>
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<80;i++){
        const s=document.createElement('div'); s.className='star';
        const sz=Math.random()*2+1;
        s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
        c.appendChild(s);
      }
    })();

    fetch('/api/config').then(r=>r.json()).then(cfg=>{
      if(cfg.bot_username){
        document.getElementById('tgRegLink').href = `https://t.me/${cfg.bot_username}?start=register`;
        document.getElementById('tgAltWrap').classList.remove('hidden');
      }
    }).catch(()=>{});

    function togglePwd(id){
      const el=document.getElementById(id);
      el.type = el.type==='password' ? 'text' : 'password';
    }

    async function handleRegister(e){
      e.preventDefault();
      const errBox=document.getElementById('regErr'), errTxt=document.getElementById('regErrText');
      const okBox=document.getElementById('regOk');
      errBox.classList.add('hidden'); okBox.classList.add('hidden');

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if(password !== confirm){
        errTxt.textContent='Les mots de passe ne correspondent pas.';
        errBox.classList.remove('hidden');
        return;
      }

      const btn=document.getElementById('regBtn'), txt=document.getElementById('regBtnTxt'), load=document.getElementById('regLoad');
      btn.disabled=true; txt.classList.add('hidden'); load.classList.remove('hidden');

      try{
        const r = await fetch('/api/register', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            password, confirm_password: confirm,
            promo_code: document.getElementById('promo').value
          })
        });
        const d = await r.json();
        if(!r.ok){
          errTxt.textContent = d.error || 'Erreur lors de l\'inscription.';
          errBox.classList.remove('hidden');
          btn.disabled=false; txt.classList.remove('hidden'); load.classList.add('hidden');
          return;
        }
        okBox.classList.remove('hidden');
        setTimeout(()=>{ window.location.href='/dashboard.html'; }, 900);
      } catch(err){
        errTxt.textContent='Erreur réseau. Réessayez.';
        errBox.classList.remove('hidden');
        btn.disabled=false; txt.classList.remove('hidden'); load.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
